<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>小狗对话框 - 互动小狗</title>
    <style>
        * {
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #f9e7c2 0%, #f5d5a4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #fffef7;
            border-radius: 64px 64px 48px 48px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2), 0 8px 12px rgba(0,0,0,0.1);
            padding: 28px 24px 36px 24px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: 0.2s;
        }
        .dog-area {
            cursor: pointer;
            margin: 16px 0 8px 0;
            transition: transform 0.1s ease;
            display: inline-block;
        }
        .dog-area:active {
            transform: scale(0.97);
        }
        .dog-emoji {
            font-size: 180px;
            filter: drop-shadow(6px 12px 18px rgba(0,0,0,0.2));
            transition: all 0.2s;
        }
        /* 摇晃动画 */
        .shake {
            animation: shakeAnim 0.3s ease-in-out 0s 2;
        }
        @keyframes shakeAnim {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(12deg); }
            75% { transform: rotate(-12deg); }
            100% { transform: rotate(0deg); }
        }
        /* 开心跳跃 */
        .jump {
            animation: jumpAnim 0.4s ease-out;
        }
        @keyframes jumpAnim {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .bubble {
            background: white;
            border-radius: 36px;
            padding: 16px 24px;
            margin: 20px 0 12px;
            box-shadow: 0 10px 15px -8px rgba(0,0,0,0.2);
            border: 2px solid #f0cf9c;
            position: relative;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fffaf0;
        }
        .bubble-text {
            font-size: 1.5rem;
            font-weight: 600;
            color: #6b3e1c;
            word-break: break-word;
        }
        /* 小尾巴 */
        .bubble::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 30px;
            border-width: 12px;
            border-style: solid;
            border-color: transparent transparent #f0cf9c transparent;
        }
        .bubble::after {
            content: "";
            position: absolute;
            top: -16px;
            left: 32px;
            border-width: 10px;
            border-style: solid;
            border-color: transparent transparent #fffaf0 transparent;
        }
        .interact-buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin-top: 28px;
            flex-wrap: wrap;
        }
        button {
            background: #ffcd94;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 10px 24px;
            border-radius: 60px;
            color: #5a2e12;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        button:active {
            transform: scale(0.94);
            background: #f0bc7a;
        }
        .status {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aa7a4a;
            background: #fbeedb;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 40px;
        }
        footer {
            font-size: 0.7rem;
            color: #b69466;
            margin-top: 24px;
        }
        @media (max-width: 500px) {
            .dog-emoji { font-size: 130px; }
            .bubble-text { font-size: 1.2rem; }
            button { font-size: 1rem; padding: 8px 18px; }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="dog-area" id="dogClickZone">
        <div class="dog-emoji" id="dogEmoji">🐕</div>
    </div>

    <div class="bubble">
        <div class="bubble-text" id="dialogText">戳戳我～ 我会跟你说话！</div>
    </div>

    <div class="interact-buttons">
        <button id="petBtn">🐾 摸摸头</button>
        <button id="feedBtn">🍖 喂骨头</button>
        <button id="playBtn">🎾 玩球球</button>
    </div>
    <div class="status" id="statusMsg">❤️ 开心小狗</div>
    <footer>🐶 点击小狗也可以聊天哦</footer>
</div>

<script>
    // 小狗的状态数据
    let mood = "happy";   // happy, hungry, excited
    let energy = 80;

    // 对话库（根据不同情境可以扩展）
    const talkResponses = {
        default: [
            "汪汪！今天天气真好～", 
            "呜呜，想出去玩！", 
            "你的手好温暖呀🐾",
            "我超喜欢你！❤️",
            "汪！有什么好吃的吗？"
        ],
        happy: [
            "汪汪！我好开心！✨", 
            "尾巴摇成螺旋桨啦～", 
            "今天超有精神！🎉"
        ],
        hungry: [
            "肚子咕噜噜... 好饿🥺", 
            "能给我一点吃的吗？", 
            "饿到汪汪叫🍖"
        ],
        excited: [
            "啊啊啊玩球球！冲鸭！", 
            "太好玩了！再来一次！", 
            "汪汪汪汪汪！（兴奋转圈）"
        ]
    };

    // 更新UI上的对话文字，并添加小狗动效
    function setDialog(message, withJump = true) {
        const dialogDiv = document.getElementById('dialogText');
        dialogDiv.textContent = message;
        // 让对话框有个闪现效果 (小开心)
        const bubble = document.querySelector('.bubble');
        bubble.style.transform = 'scale(1.01)';
        setTimeout(() => { bubble.style.transform = ''; }, 150);
        
        if (withJump) {
            const dogEmojiDiv = document.getElementById('dogEmoji');
            dogEmojiDiv.classList.remove('jump');
            // 强制重绘小技巧
            void dogEmojiDiv.offsetWidth;
            dogEmojiDiv.classList.add('jump');
            setTimeout(() => dogEmojiDiv.classList.remove('jump'), 500);
        }
    }

    // 根据当前情绪和动作获取随机语句
    function getRandomMessage(customAction = null) {
        // 如果是指定动作互动，优先用动作的特殊句子
        if (customAction === 'pet') {
            const petMsgs = ["呜～好舒服！再摸摸嘛🥰", "被摸头好幸福～", "汪！最喜欢被摸啦❤️"];
            return petMsgs[Math.floor(Math.random() * petMsgs.length)];
        }
        if (customAction === 'feed') {
            energy = Math.min(100, energy + 20);
            updateStatusText();
            const feedMsgs = ["吧唧吧唧！超好吃！🍖", "谢谢主人！我最爱骨头了～", "嗝～ 好满足！汪汪！"];
            return feedMsgs[Math.floor(Math.random() * feedMsgs.length)];
        }
        if (customAction === 'play') {
            mood = "excited";
            updateStatusText();
            const playMsgs = ["接住啦！汪汪！再来一球！🎾", "跑跑跳跳真开心！", "球球是我的最爱！"];
            return playMsgs[Math.floor(Math.random() * playMsgs.length)];
        }
        
        // 普通点击小狗对话 (根据心情)
        let msgList = talkResponses.default;
        if (mood === "happy") msgList = talkResponses.happy;
        else if (mood === "hungry") msgList = talkResponses.hungry;
        else if (mood === "excited") msgList = talkResponses.excited;
        
        // 偶尔混入一点默认句子增加丰富度
        if (Math.random() < 0.3 && mood !== "hungry") {
            msgList = talkResponses.default;
        }
        return msgList[Math.floor(Math.random() * msgList.length)];
    }

    // 更新情绪状态栏 + 根据能量调整情绪
    function updateStatusText() {
        const statusSpan = document.getElementById('statusMsg');
        // 简单逻辑: 能量过低会hungry
        if (energy < 30) {
            mood = "hungry";
            statusSpan.innerHTML = "🍽️ 肚子饿饿… 快喂我吃点东西吧";
        } else if (mood === "excited") {
            // 如果是玩耍状态，保持兴奋一会，但不覆盖太久，后续点击会改变
            statusSpan.innerHTML = "⚡ 超兴奋！摇尾巴中～～";
        } else if (mood === "happy") {
            statusSpan.innerHTML = "🐶 心情很好，尾巴翘高高 ❤️";
        } else {
            statusSpan.innerHTML = "🐕 温顺的小狗 等你互动～";
        }
        
        // 根据情绪改变小狗表情符号 (更有趣)
        const dogEmojiSpan = document.getElementById('dogEmoji');
        if (mood === "hungry") dogEmojiSpan.textContent = "🐕‍🦺🍽️";
        else if (mood === "excited") dogEmojiSpan.textContent = "🐕⚡";
        else dogEmojiSpan.textContent = "🐕";
    }

    // 处理普通点击小狗 (对话)
    function onDogClick() {
        // 增加一点能量自然消耗感 (让喂食有意义)
        if (energy > 5) energy -= 2;
        if (energy < 25 && mood !== "hungry") {
            mood = "hungry";
            updateStatusText();
        }
        const message = getRandomMessage(null);
        setDialog(message, true);
        // 加个摇尾巴特效
        const dogZone = document.getElementById('dogClickZone');
        dogZone.classList.add('shake');
        setTimeout(() => dogZone.classList.remove('shake'), 400);
    }

    // 摸摸头互动
    function onPet() {
        const message = getRandomMessage('pet');
        setDialog(message, true);
        if (mood === "hungry") {
            // 饿的时候摸头会撒娇但不消除饿
            setTimeout(() => setDialog("虽然很饿，但摸摸头还是好开心🥺", true), 1000);
        } else {
            mood = "happy";
            updateStatusText();
        }
        // 加摇晃尾巴效果
        const dogEmojiDiv = document.getElementById('dogEmoji');
        dogEmojiDiv.classList.add('shake');
        setTimeout(() => dogEmojiDiv.classList.remove('shake'), 300);
    }

    // 喂食互动
    function onFeed() {
        const message = getRandomMessage('feed');
        setDialog(message, true);
        // 喂食后情绪变happy，清除饥饿
        mood = "happy";
        if (energy > 80) energy = 100;
        updateStatusText();
        // 开心跳跃
        const dogEmojiDiv = document.getElementById('dogEmoji');
        dogEmojiDiv.classList.add('jump');
        setTimeout(() => dogEmojiDiv.classList.remove('jump'), 500);
    }

    // 玩球互动
    function onPlay() {
        if (energy < 15) {
            setDialog("呜呜… 没力气玩球了，先喂我吃点东西吧🥺", true);
            return;
        }
        const message = getRandomMessage('play');
        setDialog(message, true);
        energy = Math.max(0, energy - 15);
        mood = "excited";
        updateStatusText();
        // 兴奋特效: 加双重动画
        const dogArea = document.getElementById('dogClickZone');
        dogArea.classList.add('shake');
        setTimeout(() => dogArea.classList.remove('shake'), 400);
    }

    // 绑定事件
    document.getElementById('dogClickZone').addEventListener('click', onDogClick);
    document.getElementById('petBtn').addEventListener('click', onPet);
    document.getElementById('feedBtn').addEventListener('click', onFeed);
    document.getElementById('playBtn').addEventListener('click', onPlay);
    
    // 初始化状态文字
    updateStatusText();
    // 欢迎语
    setTimeout(() => {
        setDialog("汪汪！我是你的小狗伙伴～ 摸我喂我陪我玩吧！🐕", true);
    }, 200);
</script>
</body>
</html>
